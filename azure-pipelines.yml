trigger:
  - main

pool:
  name: Default

steps:
  - checkout: self

  - script: |
      set JAVA_HOME=C:\Program Files\Java\jdk-25.0.2
      set PATH=%JAVA_HOME%\bin;C:\Maven\bin;%PATH%
      C:\Maven\bin\mvn.cmd test
    displayName: 'Compilar y ejecutar pruebas con Maven'

  - task: PublishTestResults@2
    condition: always()
    inputs:
      testResultsFormat: 'JUnit'
      testResultsFiles: '$(System.DefaultWorkingDirectory)\target\surefire-reports\TEST-*.xml'
      failTaskOnFailedTests: false
      searchFolder: '$(System.DefaultWorkingDirectory)'
    displayName: 'Publicar resultados de pruebas'